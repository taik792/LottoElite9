<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lotto Elite Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    padding:0;
    background:#021b3a;
    background:radial-gradient(circle,#0b3b75 0%, #02142d 100%);
    font-family:'Orbitron',sans-serif;
    color:white;
    text-align:center;
}

h1{
    margin-top:20px;
    color:#00eaff;
    text-shadow:0 0 15px #00eaff;
    font-size:42px;
}

h3{
    color:white;
    margin-top:10px;
    margin-bottom:25px;
    font-weight:400;
}

.section-title{
    font-size:34px;
    color:#00eaff;
    margin-top:35px;
    margin-bottom:20px;
    text-shadow:0 0 15px #00eaff;
}

.cards{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:18px;
    padding:10px;
}

.card{
    width:220px;
    background:#001733;
    border:4px solid #ffd500;
    border-radius:28px;
    padding:18px;
    box-shadow:
        0 0 10px #ffd500,
        0 0 25px #ffd500;
}

.jolly-card{
    border:4px solid #ff2d75;

    box-shadow:
        0 0 10px #ff2d75,
        0 0 25px #ff2d75;
}

.forte-card{
    border:4px solid #00eaff;

    box-shadow:
        0 0 10px #00eaff,
        0 0 25px #00eaff;
}

.card h2{
    font-size:22px;
    margin-bottom:20px;
    color:white;
}

.ultima{
    font-size:12px;
    margin-bottom:10px;
    color:#d0d0d0;
}

.estrazione{
    font-size:14px;
    color:white;
    margin-bottom:25px;
}

.ambo{
    font-size:44px;
    color:#00f0ff;
    text-shadow:
        0 0 10px #00f0ff,
        0 0 20px #00f0ff;
    margin-bottom:25px;
}

.score{
    font-size:24px;
    color:#ff9ed1;
    text-shadow:
        0 0 10px #ff9ed1;
}

footer{
    margin-top:40px;
    padding-bottom:30px;
    color:#aaa;
    font-size:12px;
}

</style>

</head>

<body>

<h1>🔥 LOTTO ELITE PRO 🤘</h1>

<h3>Motore Ciclico PRO</h3>

<div class="section-title">🎯 TOP</div>

<div id="top" class="cards"></div>

<div class="section-title">💣 JOLLY</div>

<div id="jolly" class="cards"></div>

<div class="section-title">📊 AMBO FORTE</div>

<div id="amboForte" class="cards"></div>

<footer>
Lotto Elite Pro ©
</footer>

<script>

async function caricaRisultati() {

    const response = await fetch("risultati.json?v=" + Date.now());

    const dati = await response.json();

    // =====================
    // CONTENITORI
    // =====================

    const topContainer = document.getElementById("top");

    const jollyContainer = document.getElementById("jolly");

    const amboForteContainer = document.getElementById("amboForte");

    // Pulizia

    topContainer.innerHTML = "";

    jollyContainer.innerHTML = "";

    amboForteContainer.innerHTML = "";

    // =====================
    // CREA CARD
    // =====================

    function creaCard(item, classe = "") {

        const card = document.createElement("div");

        card.className = "card " + classe;

        card.innerHTML = `

            <h2>${item.ruota || ""}</h2>

            <div class="ultima">
                Ultima Estrazione
            </div>

            <div class="estrazione">
                ${
                    item.estrazione
                    ? item.estrazione.join(" • ")
                    : ""
                }
            </div>

            <div class="ambo">
                ${
                    item.ambo
                    ? item.ambo.join(" - ")
                    : ""
                }
            </div>

            <div class="score">
                Score: ${item.score || 0}
            </div>

        `;

        return card;
    }

    // =====================
    // TOP
    // =====================

    if (dati.top && Array.isArray(dati.top)) {

        dati.top.forEach(item => {

            topContainer.appendChild(
                creaCard(item)
            );

        });

    }

    // =====================
    // JOLLY
    // =====================

    if (dati.jolly && Array.isArray(dati.jolly)) {

        dati.jolly.forEach(item => {

            jollyContainer.appendChild(
                creaCard(item, "jolly-card")
            );

        });

    }

    // =====================
    // AMBO FORTE
    // =====================

    if (dati.amboForte && Array.isArray(dati.amboForte)) {

        dati.amboForte.forEach(item => {

            amboForteContainer.appendChild(
                creaCard(item, "forte-card")
            );

        });

    }

}

caricaRisultati();

</script>

</body>
</html>
