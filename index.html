<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lotto Elite Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    padding:15px;
    background:#041b6b;
    font-family:'Orbitron',sans-serif;
    color:white;
}

h1{
    text-align:center;
    color:#00ff11;
    margin-bottom:5px;
    font-size:28px;
    text-shadow:0 0 10px #00e5ff;
}

.subtitle{
    text-align:center;
    color:black;
    margin-bottom:25px;
    font-size:14px;
}

.section-title{
    text-align:center;
    color:#00e5ff;
    margin-top:30px;
    margin-bottom:15px;
    font-size:26px;
    text-shadow:0 0 10px #00e5ff;
}

/* --- CONFIGURAZIONE BASE: Computer (4 colonne) --- */
.container{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:15px;
}

.card{
    background:#02124d;
    border-radius:22px;
    padding:18px;
    text-align:center;
    border:4px solid #ffe600;
    box-shadow:
        0 0 10px #ffe600,
        0 0 20px #ffe600;
}

.card.jolly{
    border-color:#ff4dff;
    box-shadow:
        0 0 10px #ff4dff,
        0 0 20px #ff4dff;
}

.card.forte{
    border-color:#00e5ff;
    box-shadow:
        0 0 10px #00e5ff,
        0 0 20px #00e5ff;
}

.ruota{
    font-size:32px;
    margin-bottom:12px;
    font-weight:bold;
}

.estrazione{
    font-size:12px;
    color:#ffffff;
    margin-bottom:15px;
}

.numeri{
    font-size:48px;
    color:#7df9ff;
    margin:20px 0;
    text-shadow:
        0 0 10px #00ffff,
        0 0 20px #00ffff;
}

.score{
    font-size:24px;
    color:#ff4dff;
    margin-top:10px;
    text-shadow:
        0 0 10px #ff4dff;
}

.colpi{
    font-size:20px;
    color:#ffe600;
    margin-top:12px;
    text-shadow:
        0 0 10px #ffe600;
}

/* --- OTTIMIZZAZIONE RESPONSIVE --- */
@media(max-width:1024px){
    /* Per tablet e monitor piccoli, passa a 3 colonne */
    .container {
        grid-template-columns: repeat(3, 1fr);
    }
}

@media(max-width:768px){
    /* Per smartphone (anche molto piccoli), mantiene 2 colonne fisse ed evita l'effetto dispersivo */
    .container {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px; /* Raddensa lo spazio tra le tessere */
    }

    /* Ridimensionamento proporzionale di schede e testi per schermi stretti */
    .card {
        padding: 12px; 
        border-radius: 16px; 
        border-width: 3px; 
    }

    .ruota{
        font-size: 20px;
        margin-bottom: 8px;
    }

    .estrazione{
        font-size: 10px;
        margin-bottom: 10px;
    }

    .numeri{
        font-size: 28px; /* Dimensione ottimale per non far andare i due numeri a capo */
        margin: 12px 0;
    }

    .score{
        font-size: 16px;
    }

    .colpi{
        font-size: 14px;
        margin-top: 8px;
    }
}

</style>
</head>

<body>

<h1>🎰 LOTTO ELITE PRO 🎰</h1>
<div class="subtitle">Motore Ciclometrico Evoluto</div>

<div class="section-title">📡 RUOTE</div>
<div class="container" id="ruote"></div>

<div class="section-title">🃏 JOLLY</div>
<div class="container" id="jolly"></div>

<div class="section-title">🎯 AMBO FORTE</div>
<div class="container" id="forte"></div>

<div class="section-title">🎰 PREVISIONI ATTIVE</div>
<div class="container" id="attive"></div>

<script>

fetch("risultati.json")
.then(response => response.json())
.then(data => {

    creaSezione("ruote", data.ruote, "");
    creaSezione("jolly", data.jolly, "jolly");
    creaSezione("forte", data.ambo_forte, "forte");
    creaSezione("attive", data.previsioni_attive, "forte");

});

function creaSezione(id, lista, classe){

    const container = document.getElementById(id);

    lista.forEach(previsione => {

        const card = document.createElement("div");
        card.className = `card ${classe}`;

        card.innerHTML = `

            <div class="ruota">
                ${previsione.ruota}
            </div>

            <div class="estrazione">
                Ultima Estrazione<br>
                ${previsione.ultima_estrazione.join(" • ")}
            </div>

            <div class="numeri">
                ${previsione.ambo[0]} - ${previsione.ambo[1]}
            </div>

            <div class="score">
                Score ${previsione.score}
            </div>

            <div class="colpi">
                Colpi rimasti: ${previsione.colpi_rimanenti}
            </div>

        `;

        container.appendChild(card);

    });

}

</script>

</body>
</html>
