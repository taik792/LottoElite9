<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lotto Elite Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:
        radial-gradient(circle at top, #10355a 0%, #04111f 45%, #020b14 100%);
    min-height:100vh;
    font-family:'Orbitron', sans-serif;
    color:white;
    padding:25px;
}

.container{
    max-width:1600px;
    margin:auto;
}

.header{
    text-align:center;
    margin-bottom:40px;
}

.logo{
    font-size:48px;
    color:#00e5ff;
    font-weight:700;
    letter-spacing:2px;
    text-shadow:0 0 15px rgba(0,229,255,0.7);
}

.subtitle{
    margin-top:10px;
    font-size:24px;
    color:#ffffff;
    opacity:0.9;
}

.section-title{
    text-align:center;
    margin:35px 0 25px;
    font-size:30px;
    color:#ffffff;
    letter-spacing:2px;
}

.cards-top{
    display:flex;
    justify-content:center;
    gap:25px;
    flex-wrap:wrap;
    margin-bottom:40px;
}

.cards-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));
    gap:25px;
}

.card{
    background:rgba(7,25,43,0.92);
    border:2px solid #00d9ff;
    border-radius:22px;
    padding:20px;
    position:relative;
    overflow:hidden;
    box-shadow:
        0 0 18px rgba(0,217,255,0.18),
        inset 0 0 20px rgba(255,255,255,0.02);

    transition:0.25s ease;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:
        0 0 25px rgba(0,217,255,0.35),
        inset 0 0 20px rgba(255,255,255,0.03);
}

.card::before{
    content:"";
    position:absolute;
    width:180px;
    height:180px;
    background:rgba(0,229,255,0.06);
    border-radius:50%;
    top:-80px;
    right:-80px;
}

.card-top{
    border:2px solid #ffcc00;
    background:linear-gradient(180deg,#453000,#241800);
}

.card-top::before{
    background:rgba(255,204,0,0.12);
}

.card-jolly{
    border:2px solid #ff3d3d;
    background:linear-gradient(180deg,#6f0000,#3b0000);
}

.card-jolly::before{
    background:rgba(255,255,255,0.08);
}

.ruota{
    text-align:center;
    font-size:24px;
    font-weight:700;
    margin-bottom:18px;
    color:#ffffff;
}

.ultima{
    text-align:center;
    font-size:15px;
    color:#d8d8d8;
    line-height:1.7;
    margin-bottom:20px;
}

.numeri{
    text-align:center;
    font-size:44px;
    color:#00e5ff;
    font-weight:700;
    margin:18px 0;
    text-shadow:0 0 12px rgba(0,229,255,0.45);
}

.card-top .numeri{
    color:#00f7ff;
}

.card-jolly .numeri{
    color:#ffffff;
}

.score{
    text-align:center;
    margin-top:18px;
    color:#ffb3c7;
    font-size:24px;
    font-weight:700;
}

.footer-space{
    height:60px;
}

@media(max-width:900px){

    .logo{
        font-size:34px;
    }

    .subtitle{
        font-size:20px;
    }

    .section-title{
        font-size:24px;
    }

    .numeri{
        font-size:36px;
    }

    .card{
        padding:18px;
    }
}

@media(max-width:600px){

    body{
        padding:15px;
    }

    .cards-grid{
        grid-template-columns:1fr;
    }

    .numeri{
        font-size:32px;
    }

    .ruota{
        font-size:22px;
    }
}

</style>
</head>

<body>

<div class="container">

    <div class="header">
        <div class="logo">🔥 LOTTO ELITE PRO 🤘</div>
        <div class="subtitle">Motore 9 PRO - Versione Ambo</div>
    </div>


    <div class="section-title">🎯 TOP</div>
    <div id="top" class="cards-top"></div>


    <div class="section-title">💣 JOLLY</div>
    <div id="jolly" class="cards-top"></div>


    <div class="section-title">📊 TERNO FORTE</div>
    <div id="ruote" class="cards-grid"></div>

    <div class="footer-space"></div>

</div>

<script>

fetch("risultati.json")
.then(response => response.json())
.then(data => {

    // TOP
    const topDiv = document.getElementById("top");

    Object.entries(data.top).forEach(([ruota, dati]) => {

        topDiv.innerHTML += `
        <div class="card card-top">

            <div class="ruota">${ruota}</div>

            <div class="numeri">
                ${dati.ambo.join(" — ")}
            </div>

            <div class="score">
                ${dati.score}
            </div>

        </div>
        `;
    });


    // JOLLY
    const jollyDiv = document.getElementById("jolly");

    Object.entries(data.jolly).forEach(([ruota, dati]) => {

        jollyDiv.innerHTML += `
        <div class="card card-jolly">

            <div class="ruota">${ruota}</div>

            <div class="numeri">
                ${dati.ambo.join(" — ")}
            </div>

        </div>
        `;
    });


    // RUOTE
    const ruoteDiv = document.getElementById("ruote");

    Object.entries(data.ruote).forEach(([ruota, dati]) => {

        ruoteDiv.innerHTML += `
        <div class="card">

            <div class="ruota">
                ${ruota}
            </div>

            <div class="ultima">
                ${dati.ultima_estrazione.join(" • ")}
            </div>

            <div class="numeri">
                ${dati.ambo.join(" — ")}
            </div>

            <div class="score">
                ${dati.score}
            </div>

        </div>
        `;
    });

})
.catch(error => {
    console.log(error);
});

</script>

</body>
</html>
