<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lotto Elite PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    padding:0;
    background:
    radial-gradient(circle at top,#063b73 0%,#02152b 70%);
    font-family:'Orbitron',sans-serif;
    color:white;
    text-align:center;
}

h1{
    color:#00eaff;
    font-size:48px;
    margin-top:30px;
    text-shadow:0 0 20px #00eaff;
}

h2{
    margin-top:40px;
    font-size:40px;
    color:white;
}

.subtitle{
    font-size:18px;
    margin-top:-10px;
    margin-bottom:30px;
    color:#cccccc;
}

.section{
    margin-top:30px;
}

.cards{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:25px;
    padding:20px;
}

.card{
    width:260px;
    min-height:320px;

    background:rgba(0,0,0,0.35);

    border:3px solid #00eaff;

    border-radius:30px;

    box-shadow:
    0 0 20px #00eaff88,
    inset 0 0 20px #00eaff22;

    padding:20px;

    backdrop-filter:blur(8px);
}

.top-card{
    border-color:gold;

    box-shadow:
    0 0 25px gold,
    inset 0 0 20px rgba(255,215,0,0.2);
}

.jolly-card{
    border-color:#ff3b3b;

    box-shadow:
    0 0 25px #ff3b3b,
    inset 0 0 20px rgba(255,0,0,0.2);
}

.ruota{
    font-size:42px;
    margin-top:10px;
    margin-bottom:20px;
}

.estrazione-label{
    font-size:18px;
    color:#dddddd;
    margin-top:10px;
}

.estrazione{
    font-size:20px;
    color:#ffffff;
    margin-top:10px;
    margin-bottom:25px;
}

.ambo{
    font-size:58px;
    color:#00f7ff;

    text-shadow:
    0 0 10px #00f7ff,
    0 0 25px #00f7ff;

    margin-top:15px;
    margin-bottom:25px;
}

.score{
    font-size:32px;
    color:#ffb6d9;

    text-shadow:
    0 0 10px #ffb6d9;
}

@media(max-width:700px){

    h1{
        font-size:34px;
    }

    .card{
        width:85%;
        min-height:auto;
    }

    .ambo{
        font-size:44px;
    }

    .ruota{
        font-size:32px;
    }

}

</style>
</head>

<body>

<h1>🔥 LOTTO ELITE PRO 🤘</h1>

<div class="subtitle">
Motore Ciclico PRO
</div>

<div class="section">

<h2>🎯 TOP</h2>

<div class="cards" id="top"></div>

</div>

<div class="section">

<h2>💣 JOLLY</h2>

<div class="cards" id="jolly"></div>

</div>

<div class="section">

<h2>📊 AMBO FORTE</h2>

<div class="cards" id="ruote"></div>

</div>

<script>

function creaCard(dati, classe = "") {

    return `

    <div class="card ${classe}">

        <div class="ruota">
            ${dati.ruota}
        </div>

        ${dati.estrazione ? `

        <div class="estrazione-label">
            Ultima Estrazione
        </div>

        <div class="estrazione">
            ${dati.estrazione.join(" • ")}
        </div>

        ` : ""}

        <div class="ambo">
            ${dati.ambo[0]} - ${dati.ambo[1]}
        </div>

        <div class="score">
            Score: ${dati.score}
        </div>

    </div>

    `;
}

fetch("risultati.json")

.then(response => response.json())

.then(data => {

    // TOP

    const top = document.getElementById("top");

    data.top.forEach(item => {

        top.innerHTML += creaCard(item, "top-card");

    });

    // JOLLY

    const jolly = document.getElementById("jolly");

    jolly.innerHTML = creaCard(data.jolly, "jolly-card");

    // RUOTE

    const ruote = document.getElementById("ruote");

    data.ruote.forEach(item => {

        ruote.innerHTML += creaCard(item);

    });

})

.catch(error => {

    console.log(error);

});

</script>

</body>
</html>
