<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lotto Elite PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    padding:0;
    font-family:'Orbitron',sans-serif;
    background:
    radial-gradient(circle at center,#0b4da1 0%,#03142d 100%);
    color:white;
    text-align:center;
}

header{
    padding:30px 15px;
}

h1{
    font-size:48px;
    color:#00eaff;
    text-shadow:
        0 0 10px #00eaff,
        0 0 25px #00eaff;
    margin:0;
}

.subtitle{
    margin-top:10px;
    font-size:22px;
    color:#ffffffcc;
}

.section-title{
    margin-top:50px;
    margin-bottom:25px;
    font-size:34px;
    color:#00eaff;
    text-shadow:
        0 0 10px #00eaff,
        0 0 20px #00eaff;
}

.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:25px;
    padding:10px 20px 40px;
}

.card{
    width:260px;
    background:rgba(0,0,30,0.75);
    border-radius:30px;
    padding:25px;
    backdrop-filter:blur(5px);
    transition:0.3s;
}

.card:hover{
    transform:scale(1.03);
}

.top-card{
    border:5px solid #ffe600;
    box-shadow:
        0 0 15px #ffe600,
        0 0 35px #ffe600;
}

.jolly-card{
    border:5px solid #ff2d75;
    box-shadow:
        0 0 15px #ff2d75,
        0 0 35px #ff2d75;
}

.forte-card{
    border:5px solid #00eaff;
    box-shadow:
        0 0 15px #00eaff,
        0 0 35px #00eaff;
}

.ruota{
    font-size:38px;
    margin-bottom:20px;
}

.label{
    font-size:18px;
    opacity:0.8;
    margin-bottom:10px;
}

.estrazione{
    font-size:18px;
    color:#ffffffcc;
    margin-bottom:30px;
}

.ambo{
    font-size:54px;
    color:#00f7ff;
    text-shadow:
        0 0 10px #00f7ff,
        0 0 25px #00f7ff;
    margin-bottom:25px;
}

.score{
    font-size:28px;
    color:#ff8ad8;
    text-shadow:
        0 0 10px #ff8ad8;
}

footer{
    margin-top:50px;
    padding-bottom:40px;
    opacity:0.5;
    font-size:12px;
}

@media(max-width:700px){

    h1{
        font-size:34px;
    }

    .section-title{
        font-size:28px;
    }

    .card{
        width:85%;
    }

    .ambo{
        font-size:44px;
    }

    .ruota{
        font-size:34px;
    }
}

</style>
</head>

<body>

<header>
    <h1>🔥 LOTTO ELITE PRO 🤘</h1>
    <div class="subtitle">Motore Ciclico PRO</div>
</header>

<!-- TUTTE LE RUOTE -->
<div class="section-title">🎯 TOP</div>
<div id="top-container" class="container"></div>

<!-- JOLLY -->
<div class="section-title">💣 JOLLY</div>
<div id="jolly-container" class="container"></div>

<!-- AMBO FORTE -->
<div class="section-title">📊 AMBO FORTE</div>
<div id="forte-container" class="container"></div>

<footer>
    Lotto Elite PRO
</footer>

<script>

function creaCards(lista, containerId, classe){

    const container = document.getElementById(containerId);

    // PULISCE CONTAINER
    container.innerHTML = "";

    // NESSUN RISULTATO
    if(!lista || lista.length === 0){

        container.innerHTML = `
            <div style="
                opacity:0.6;
                font-size:18px;
                margin-top:20px;
            ">
                Nessun risultato
            </div>
        `;

        return;
    }

    // CREA CARDS
    lista.forEach(item => {

        const card = document.createElement("div");

        card.className = `card ${classe}`;

        card.innerHTML = `
            <div class="ruota">${item.ruota}</div>

            <div class="label">
                Ultima Estrazione
            </div>

            <div class="estrazione">
                ${item.estrazione.join(" • ")}
            </div>

            <div class="ambo">
                ${item.ambo[0]} - ${item.ambo[1]}
            </div>

            <div class="score">
                Score: ${item.score}
            </div>
        `;

        // AGGIUNGE CARD
        container.appendChild(card);

    });
}

fetch("risultati.json?v=" + new Date().getTime())

.then(response => response.json())

.then(data => {

    // TUTTE LE RUOTE
    creaCards(
        data.tutte,
        "top-container",
        "top-card"
    );

    // JOLLY
    creaCards(
        data.jolly,
        "jolly-container",
        "jolly-card"
    );

    // AMBO FORTE
    creaCards(
        data.ambo_forte,
        "forte-container",
        "forte-card"
    );

})

.catch(error => {

    console.error(error);

    document.body.innerHTML += `
        <div style="
            color:red;
            margin-top:40px;
            font-size:22px;
        ">
            Errore caricamento risultati.json
        </div>
    `;
});

</script>

</body>
</html>
