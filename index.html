<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>LOTTO ELITE PRO</title>

<style>
body{
    margin:0;
    padding:20px;
    background:#031826;
    color:white;
    font-family:Arial;
    text-align:center;
}

h1{
    color:#00e5ff;
    margin-bottom:5px;
}

h2{
    margin-top:0;
    margin-bottom:30px;
}

.sezione{
    margin-bottom:40px;
}

.cards{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.card{
    background:#08263d;
    border:2px solid #00d9ff;
    border-radius:15px;
    padding:15px;
    width:220px;
    box-shadow:0 0 10px #000;
}

.card-top{
    border-color:gold;
    background:#3b2d00;
}

.card-jolly{
    border-color:#ff3b3b;
    background:#5c0000;
}

.ruota{
    font-size:22px;
    font-weight:bold;
    margin-bottom:10px;
}

.numeri{
    font-size:38px;
    color:#00e5ff;
    font-weight:bold;
    margin:15px 0;
}

.score{
    color:#ff9db1;
    font-size:24px;
    font-weight:bold;
}

.ultima{
    font-size:18px;
    color:#ffffff;
    margin-bottom:15px;
    line-height:1.5;
}

@media(max-width:700px){

    .card{
        width:90%;
    }

    .numeri{
        font-size:30px;
    }
}
</style>
</head>

<body>

<h1>🔥 LOTTO ELITE PRO 🤘</h1>
<h2>Motore 9 PRO</h2>

<div class="sezione">
<h2>🎯 TOP</h2>
<div id="top" class="cards"></div>
</div>

<div class="sezione">
<h2>💣 JOLLY</h2>
<div id="jolly" class="cards"></div>
</div>

<div class="sezione">
<h2>📊 TERNO FORTE</h2>
<div id="ruote" class="cards"></div>
</div>

<script>

fetch("risultati.json")
.then(res => res.json())
.then(data => {

    // TOP
    const topDiv = document.getElementById("top");

    Object.entries(data.top).forEach(([ruota, dati]) => {

        topDiv.innerHTML += `
        <div class="card card-top">
            <div class="ruota">${ruota}</div>

            <div class="numeri">
                ${dati.ambo.join(" — ")}
            </div>

            <div class="score">
                ${dati.score}
            </div>
        </div>
        `;
    });


    // JOLLY
    const jollyDiv = document.getElementById("jolly");

    Object.entries(data.jolly).forEach(([ruota, dati]) => {

        jollyDiv.innerHTML += `
        <div class="card card-jolly">
            <div class="ruota">${ruota}</div>

            <div class="numeri">
                ${dati.ambo.join(" — ")}
            </div>
        </div>
        `;
    });


    // RUOTE
    const ruoteDiv = document.getElementById("ruote");

    Object.entries(data.ruote).forEach(([ruota, dati]) => {

        ruoteDiv.innerHTML += `
        <div class="card">

            <div class="ruota">
                ${ruota}
            </div>

            <div class="ultima">
                ${dati.ultima_estrazione.join(" • ")}
            </div>

            <div class="numeri">
                ${dati.ambo.join(" — ")}
            </div>

            <div class="score">
                ${dati.score}
            </div>

        </div>
        `;
    });

})
.catch(err => {
    console.log(err);
});

</script>

</body>
</html>
