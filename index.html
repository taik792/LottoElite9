<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lotto Elite Pro</title>

<style>

body{
    margin:0;
    padding:0;
    background:#031b4e;
    font-family:Arial, sans-serif;
    color:white;
    text-align:center;
}

h1{
    margin-top:20px;
    color:#00eaff;
    text-shadow:0 0 20px #00eaff;
    font-size:42px;
}

.sezione{
    margin-top:40px;
}

.sezione h2{
    color:#00eaff;
    text-shadow:0 0 12px #00eaff;
    margin-bottom:20px;
    font-size:28px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    max-width:1400px;
    margin:auto;
    padding:20px;
}

.card{
    background:#071633;
    border-radius:25px;
    padding:20px;
    border:3px solid #ffe600;
    box-shadow:0 0 20px #ffe600;
}

.card.jolly{
    border:3px solid #ff2ea6;
    box-shadow:0 0 20px #ff2ea6;
}

.card.forte{
    border:3px solid #00eaff;
    box-shadow:0 0 20px #00eaff;
}

.ruota{
    font-size:32px;
    margin-bottom:10px;
    font-weight:bold;
}

.estrazione{
    font-size:15px;
    color:#ddd;
    margin-bottom:20px;
    line-height:1.6;
}

.ambo{
    font-size:52px;
    color:#00f7ff;
    text-shadow:0 0 20px #00f7ff;
    margin-bottom:15px;
    font-weight:bold;
}

.score{
    font-size:26px;
    color:#ff77c8;
    text-shadow:0 0 10px #ff77c8;
}

footer{
    margin:40px 0;
    color:#8fb6ff;
    font-size:14px;
}

</style>

</head>

<body>

<h1>🔥 LOTTO ELITE PRO 🤘</h1>

<div class="sezione">

    <h2>🎰 RUOTE</h2>

    <div class="grid" id="top"></div>

</div>

<div class="sezione">

    <h2>💣 JOLLY</h2>

    <div class="grid" id="jolly"></div>

</div>

<div class="sezione">

    <h2>📊 AMBO FORTE</h2>

    <div class="grid" id="forte"></div>

</div>

<footer>
Motore Ciclico PRO
</footer>

<script>

fetch("risultati.json")

.then(response => response.json())

.then(data => {

    const ordineRuote = [
        "Bari",
        "Cagliari",
        "Firenze",
        "Genova",
        "Milano",
        "Napoli",
        "Palermo",
        "Roma",
        "Torino",
        "Venezia"
    ];

    function ordinaRuote(lista){

        return lista.sort((a,b) => {

            return ordineRuote.indexOf(a.ruota)
                 - ordineRuote.indexOf(b.ruota);

        });

    }

    function creaCard(item, classe=""){

        return `

        <div class="card ${classe}">

            <div class="ruota">
                ${item.ruota}
            </div>

            <div class="estrazione">

                Ultima Estrazione<br>

                ${item.estrazione.join(" • ")}

            </div>

            <div class="ambo">

                ${item.ambo[0]} - ${item.ambo[1]}

            </div>

            <div class="score">

                Score ${item.score}

            </div>

        </div>

        `;

    }

    // RUOTE

    document.getElementById("top").innerHTML =

        ordinaRuote(data.tutte)

        .map(item => creaCard(item))

        .join("");

    // JOLLY

    document.getElementById("jolly").innerHTML =

        ordinaRuote(data.jolly)

        .map(item => creaCard(item, "jolly"))

        .join("");

    // AMBO FORTE

    document.getElementById("forte").innerHTML =

        ordinaRuote(data.ambo_forte)

        .map(item => creaCard(item, "forte"))

        .join("");

})

.catch(error => {

    console.log(error);

});

</script>

</body>
</html>
