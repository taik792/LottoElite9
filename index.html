<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lotto Elite Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    padding:0;
    background: radial-gradient(circle at top, #08325f 0%, #000814 100%);
    font-family:'Orbitron', sans-serif;
    color:white;
}

.container{
    width:95%;
    margin:auto;
    text-align:center;
    padding-bottom:50px;
}

h1{
    color:#00eaff;
    font-size:42px;
    margin-top:20px;
    text-shadow:0 0 15px #00eaff;
}

.subtitle{
    font-size:18px;
    margin-bottom:30px;
    color:#d8d8d8;
}

.section-title{
    margin-top:40px;
    margin-bottom:20px;
    font-size:34px;
}

.top-grid{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
}

.ruote-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
    gap:20px;
    margin-top:30px;
}

.card{
    background:rgba(255,170,0,0.15);
    border:3px solid #ffbf00;
    border-radius:25px;
    padding:20px;
    box-shadow:0 0 20px rgba(255,191,0,0.4);
}

.card.jolly{
    background:rgba(255,0,0,0.18);
    border:3px solid #ff3b3b;
    box-shadow:0 0 20px rgba(255,0,0,0.5);
}

.card.ruota{
    background:rgba(0,255,255,0.08);
    border:2px solid #00eaff;
    box-shadow:0 0 15px rgba(0,234,255,0.25);
}

.ruota-nome{
    font-size:24px;
    margin-bottom:15px;
    color:white;
}

.estrazione{
    font-size:14px;
    color:#d7d7d7;
    margin-bottom:15px;
    line-height:1.7;
}

.numeri{
    font-size:48px;
    color:#00f7ff;
    text-shadow:0 0 12px #00f7ff;
    margin:10px 0;
}

.score{
    color:#ffb6d9;
    font-size:24px;
    margin-top:10px;
}

.jolly-box{
    display:flex;
    justify-content:center;
    margin-top:20px;
}

@media(max-width:768px){

    h1{
        font-size:32px;
    }

    .numeri{
        font-size:38px;
    }

    .section-title{
        font-size:28px;
    }
}

</style>
</head>
<body>

<div class="container">

<h1>🔥 LOTTO ELITE PRO 🤘</h1>
<div class="subtitle">Motore Ciclico PRO</div>

<div class="section-title">🎯 TOP</div>
<div id="top" class="top-grid"></div>

<div class="section-title">💣 JOLLY</div>
<div class="jolly-box" id="jolly"></div>

<div class="section-title">📊 AMBO FORTE</div>
<div id="ruote" class="ruote-grid"></div>

</div>

<script>

fetch('risultati.json')
.then(response => response.json())
.then(dati => {

    // =========================
    // TOP
    // =========================

    const topContainer = document.getElementById('top');

    dati.top.forEach(item => {

        topContainer.innerHTML += `
        <div class="card">
            <div class="ruota-nome">${item.ruota}</div>
            <div class="numeri">${item.numeri[0]} - ${item.numeri[1]}</div>
            <div class="score">${item.score}</div>
        </div>
        `;
    });

    // =========================
    // JOLLY
    // =========================

    const jolly = dati.jolly;

    document.getElementById('jolly').innerHTML = `
        <div class="card jolly">
            <div class="ruota-nome">${jolly.ruota}</div>
            <div class="numeri">${jolly.numeri[0]} - ${jolly.numeri[1]}</div>
            <div class="score">${jolly.score}</div>
        </div>
    `;

    // =========================
    // RUOTE
    // =========================

    const ruoteContainer = document.getElementById('ruote');

    Object.entries(dati.ruote).forEach(([nome, info]) => {

        ruoteContainer.innerHTML += `
        <div class="card ruota">

            <div class="ruota-nome">
                ${nome.charAt(0).toUpperCase() + nome.slice(1)}
            </div>

            <div class="estrazione">
                Ultima Estrazione<br>
                ${info.ultima_estrazione.join(' • ')}
            </div>

            <div class="numeri">
                ${info.numeri[0]} - ${info.numeri[1]}
            </div>

            <div class="score">
                Score: ${info.score}
            </div>

        </div>
        `;
    });

});

</script>

</body>
</html>
