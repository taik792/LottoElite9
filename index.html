<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lotto Elite Pro</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#001b5e;
    font-family:Arial,sans-serif;
    color:white;
    text-align:center;
}

h1{
    color:#00f7ff;
    text-shadow:0 0 15px #00f7ff;
    margin-bottom:5px;
}

.sottotitolo{
    margin-bottom:30px;
    color:white;
}

.sezione{
    margin-top:35px;
}

.sezione h2{
    color:#00f7ff;
    text-shadow:0 0 10px #00f7ff;
    margin-bottom:20px;
}

.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.card{
    width:180px;
    background:#00113d;
    border-radius:20px;
    padding:15px;
    border:4px solid gold;
    box-shadow:0 0 20px gold;
}

.card.jolly{
    border:4px solid #ff4fd8;
    box-shadow:0 0 20px #ff4fd8;
}

.card.forte{
    border:4px solid #00eaff;
    box-shadow:0 0 20px #00eaff;
}

.ruota{
    font-size:28px;
    font-weight:bold;
    margin-bottom:10px;
}

.label{
    font-size:14px;
    color:#ddd;
}

.estrazione{
    font-size:14px;
    margin-top:5px;
    margin-bottom:15px;
}

.ambo{
    font-size:42px;
    color:#7ffcff;
    text-shadow:0 0 15px #00f7ff;
    margin-bottom:15px;
}

.score{
    color:#ff69d9;
    font-size:24px;
    font-weight:bold;
}

@media(max-width:700px){

    .container{
        flex-direction:column;
        align-items:center;
    }

    .card{
        width:85%;
        max-width:300px;
    }

    .ambo{
        font-size:48px;
    }

}

</style>
</head>

<body>

<h1>🔥 LOTTO ELITE PRO 🤘</h1>
<div class="sottotitolo">Motore Ciclico PRO</div>

<div class="sezione">
    <h2>🎰 RUOTE</h2>
    <div class="container" id="ruote"></div>
</div>

<div class="sezione">
    <h2>💣 JOLLY</h2>
    <div class="container" id="jolly"></div>
</div>

<div class="sezione">
    <h2>📊 AMBO FORTE</h2>
    <div class="container" id="forti"></div>
</div>

<script>

fetch("risultati.json")
.then(r => r.json())
.then(data => {

    const tutte = data.tutte || [];

    // ORDINE RUOTE FISSO
    const ordineRuote = [
        "Bari",
        "Cagliari",
        "Firenze",
        "Genova",
        "Milano",
        "Napoli",
        "Palermo",
        "Roma",
        "Torino",
        "Venezia"
    ];

    // ORDINA LE RUOTE
    tutte.sort((a,b)=>{
        return ordineRuote.indexOf(a.ruota) - ordineRuote.indexOf(b.ruota);
    });

    const ruoteDiv = document.getElementById("ruote");
    const jollyDiv = document.getElementById("jolly");
    const fortiDiv = document.getElementById("forti");

    // CREA CARD RUOTE
    tutte.forEach(item=>{

        const card = creaCard(item,"");

        ruoteDiv.appendChild(card);

    });

    // JOLLY = TOP 3 SCORE
    const jolly = [...tutte]
    .sort((a,b)=>b.score-a.score)
    .slice(0,3);

    jolly.forEach(item=>{

        const card = creaCard(item,"jolly");

        jollyDiv.appendChild(card);

    });

    // AMBI FORTI = SCORE >=7
    const forti = [...tutte]
    .filter(x=>x.score >= 7)
    .sort((a,b)=>b.score-a.score)
    .slice(0,5);

    forti.forEach(item=>{

        const card = creaCard(item,"forte");

        fortiDiv.appendChild(card);

    });

});

function creaCard(item,classe){

    const card = document.createElement("div");

    card.className = "card " + classe;

    card.innerHTML = `

        <div class="ruota">${item.ruota}</div>

        <div class="label">Ultima Estrazione</div>

        <div class="estrazione">
            ${item.estrazione.join(" • ")}
        </div>

        <div class="ambo">
            ${item.ambo[0]} - ${item.ambo[1]}
        </div>

        <div class="score">
            Score ${item.score}
        </div>

    `;

    return card;
}

</script>

</body>
</html>
