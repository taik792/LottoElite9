<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lotto Elite Pro</title>

<style>

body{
    margin:0;
    background:#031b4e;
    font-family:Arial;
    color:white;
    text-align:center;
}

h1{
    color:#00eaff;
    text-shadow:0 0 20px #00eaff;
    margin-top:20px;
}

.sezione{
    margin-top:40px;
}

.sezione h2{
    color:#00eaff;
    text-shadow:0 0 15px #00eaff;
    margin-bottom:25px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    max-width:1400px;
    margin:auto;
    padding:20px;
}

.card{
    background:#071633;
    border-radius:25px;
    padding:20px;
    box-shadow:0 0 20px #ffe600;
    border:3px solid #ffe600;
}

.card.jolly{
    border:3px solid #ff2ea6;
    box-shadow:0 0 20px #ff2ea6;
}

.card.forte{
    border:3px solid #00eaff;
    box-shadow:0 0 20px #00eaff;
}

.ruota{
    font-size:32px;
    margin-bottom:10px;
}

.estrazione{
    font-size:15px;
    color:#ddd;
    margin-bottom:20px;
}

.ambo{
    font-size:52px;
    color:#00f7ff;
    text-shadow:0 0 20px #00f7ff;
    margin-bottom:15px;
}

.score{
    color:#ff77c8;
    font-size:28px;
}

</style>
</head>

<body>

<h1>🔥 LOTTO ELITE PRO 🤘</h1>

<div class="sezione">
    <h2>🎯 TOP</h2>
    <div class="grid" id="top"></div>
</div>

<div class="sezione">
    <h2>💣 JOLLY</h2>
    <div class="grid" id="jolly"></div>
</div>

<div class="sezione">
    <h2>📊 AMBO FORTE</h2>
    <div class="grid" id="forte"></div>
</div>

<script>

fetch("risultati.json")
.then(r=>r.json())
.then(data=>{

    function creaCard(item, classe=""){

        return `
        <div class="card ${classe}">
            <div class="ruota">${item.ruota}</div>

            <div class="estrazione">
                Ultima Estrazione<br>
                ${item.estrazione.join(" • ")}
            </div>

            <div class="ambo">
                ${item.ambo[0]} - ${item.ambo[1]}
            </div>

            <div class="score">
                Score ${item.score}
            </div>
        </div>
        `;
    }

    // TOP
    document.getElementById("top").innerHTML =
        data.tutte
        .map(x=>creaCard(x))
        .join("");

    // JOLLY
    document.getElementById("jolly").innerHTML =
        data.jolly
        .map(x=>creaCard(x,"jolly"))
        .join("");

    // FORTE
    document.getElementById("forte").innerHTML =
        data.ambo_forte
        .map(x=>creaCard(x,"forte"))
        .join("");

});

</script>

</body>
</html>
