<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lotto Elite PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    padding:20px;
    background:#001b5e;
    font-family:'Orbitron',sans-serif;
    color:white;
    text-align:center;
}

h1{
    color:#00eaff;
    text-shadow:0 0 20px #00eaff;
    margin-bottom:5px;
}

h2{
    color:#00eaff;
    margin-top:40px;
    text-shadow:0 0 10px #00eaff;
}

.sottotitolo{
    color:white;
    margin-bottom:30px;
    font-size:12px;
}

.griglia{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    margin-top:20px;
}

.card{
    background:#00103a;
    border-radius:20px;
    padding:20px;
    width:180px;
    box-shadow:0 0 15px #ffe600;
    border:3px solid #ffe600;
}

.card-jolly{
    box-shadow:0 0 20px #ff4df0;
    border:3px solid #ff4df0;
}

.card-forte{
    box-shadow:0 0 20px #00eaff;
    border:3px solid #00eaff;
}

.ruota{
    font-size:28px;
    margin-bottom:10px;
    font-weight:bold;
}

.estrazione{
    font-size:12px;
    color:#ffffff;
    margin-bottom:20px;
    line-height:1.5;
}

.ambo{
    font-size:48px;
    color:#7ffcff;
    text-shadow:0 0 15px #00ffff;
    margin-bottom:20px;
}

.score{
    font-size:24px;
    color:#ff5fcf;
    text-shadow:0 0 10px #ff5fcf;
}

.colpi{
    margin-top:10px;
    font-size:18px;
    color:#ffe600;
    text-shadow:0 0 10px #ffe600;
}

.footer{
    margin-top:40px;
    font-size:10px;
    opacity:0.7;
}

@media(max-width:700px){

    body{
        padding:10px;
    }

    .card{
        width:90%;
    }

    .ambo{
        font-size:42px;
    }

    .ruota{
        font-size:24px;
    }
}

</style>
</head>

<body>

<h1>🔥 LOTTO ELITE PRO 🤘</h1>

<div class="sottotitolo">
    Motore Ciclometrico Evoluto
</div>

<!-- RUOTE -->

<h2>🎰 RUOTE</h2>

<div class="griglia" id="ruote"></div>

<!-- JOLLY -->

<h2>💣 JOLLY</h2>

<div class="griglia" id="jolly"></div>

<!-- AMBO FORTE -->

<h2>📊 AMBO FORTE</h2>

<div class="griglia" id="ambo-forte"></div>

<div class="footer">
    Lotto Elite PRO
</div>

<script>

async function caricaDati(){

    const response = await fetch(
        "risultati.json?v=" + new Date().getTime()
    );

    const data = await response.json();

    const tutte = data.tutte || [];
    const jolly = data.jolly || [];
    const ambiForti = data.ambo_forte || [];

    mostraRuote(tutte, "ruote", "");
    mostraRuote(jolly, "jolly", "card-jolly");
    mostraRuote(ambiForti, "ambo-forte", "card-forte");
}

function mostraRuote(lista, idContainer, classe){

    const container = document.getElementById(idContainer);

    container.innerHTML = "";

    lista.forEach(item => {

        const card = document.createElement("div");

        card.className = `card ${classe}`;

        card.innerHTML = `

            <div class="ruota">
                ${item.ruota}
            </div>

            <div class="estrazione">
                Ultima Estrazione<br>
                ${item.estrazione.join(" • ")}
            </div>

            <div class="ambo">
                ${item.ambo[0]} - ${item.ambo[1]}
            </div>

            <div class="score">
                Score ${item.score}
            </div>

            <div class="colpi">
                Colpi rimasti: ${item.colpi_rimasti}
            </div>

        `;

        container.appendChild(card);

    });
}

caricaDati();

</script>

</body>
</html>
