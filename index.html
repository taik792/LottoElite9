<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lotto Elite Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    padding:0;
    font-family:'Orbitron',sans-serif;
    background:
    radial-gradient(circle at center,#0b3d7a 0%,#00152d 70%);
    color:white;
    text-align:center;
}

h1{
    color:#00e5ff;
    font-size:58px;
    margin-top:30px;
    text-shadow:0 0 20px #00e5ff;
}

h2{
    margin-top:10px;
    color:#d9d9d9;
    font-weight:400;
}

.sezione{
    margin-top:50px;
}

.cards{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:30px;
    padding:20px;
}

.card{
    width:320px;
    border:4px solid #ffd700;
    border-radius:35px;
    padding:30px 20px;
    background:rgba(0,0,0,0.18);
    box-shadow:
    0 0 15px #ffd700,
    0 0 35px rgba(255,215,0,0.5);
}

.ruota{
    font-size:42px;
    margin-bottom:25px;
}

.estrazione{
    font-size:20px;
    color:#e5e5e5;
    margin-bottom:25px;
    line-height:1.8;
}

.ambo{
    font-size:72px;
    color:#00f0ff;
    text-shadow:0 0 15px #00f0ff;
    margin-bottom:25px;
}

.score{
    font-size:34px;
    color:#ffb3d9;
}

.jolly-card{
    border-color:#ff2d55;
    box-shadow:
    0 0 15px #ff2d55,
    0 0 35px rgba(255,45,85,0.5);
}

</style>
</head>

<body>

<h1>🔥 LOTTO ELITE PRO 🤘</h1>
<h2>Motore Ciclico PRO</h2>

<div class="sezione">

<h1 style="font-size:45px;">🎯 TOP</h1>

<div class="cards" id="top"></div>

</div>

<div class="sezione">

<h1 style="font-size:45px;">💣 JOLLY</h1>

<div class="cards" id="jolly"></div>

</div>

<div class="sezione">

<h1 style="font-size:45px;">📊 AMBO FORTE</h1>

<div class="cards" id="ruote"></div>

</div>

<script>

fetch("risultati.json")
.then(res => res.json())
.then(data => {

    const top = document.getElementById("top");
    const jolly = document.getElementById("jolly");
    const ruote = document.getElementById("ruote");

    function creaCard(item, classe="") {

        return `

        <div class="card ${classe}">

            <div class="ruota">${item.ruota}</div>

            <div class="estrazione">
                Ultima Estrazione<br>
                ${item.estrazione.join(" · ")}
            </div>

            <div class="ambo">
                ${item.ambo[0]} - ${item.ambo[1]}
            </div>

            <div class="score">
                Score: ${item.score}
            </div>

        </div>

        `;
    }

    // TOP

    data.top.forEach(item => {

        top.innerHTML += creaCard(item);

    });

    // JOLLY

    if(data.jolly){

        jolly.innerHTML += creaCard(data.jolly,"jolly-card");

    }

    // ORDINE RUOTE

    const ordineRuote = [
        "Bari",
        "Cagliari",
        "Firenze",
        "Genova",
        "Milano",
        "Napoli",
        "Palermo",
        "Roma",
        "Torino",
        "Venezia",
        "Nazionale"
    ];

    data.ruote.sort((a,b)=>{

        return ordineRuote.indexOf(a.ruota)
        - ordineRuote.indexOf(b.ruota);

    });

    // RUOTE

    data.ruote.forEach(item => {

        ruote.innerHTML += creaCard(item);

    });

});

</script>

</body>
</html>
